catalog_id: catalog_index.v2
created: "2026-05-12"
status: v2_catalog_source_of_truth_index
purpose: >
  Index for the clean v2 feature catalogue. V2 files are intended to be source-backed
  knowledge/specification artifacts, not outputs from the previous synthetic model.

source_policy:
  allowed_source_tiers:
    tier_1_official: Vendor, platform, standards, or first-party product documentation.
    tier_2_paper: Peer-reviewed or arXiv technical papers; use with explicit confidence.
    tier_3_reputable_context: Benchmarks, operator posts, public datasets, or public reports.
    tier_4_assumption: Explicit project assumption requiring later validation.
  banned_ground_truth_inputs:
    - data/model_runs/synthetic_v1_baseline/feature_importance.csv
    - data/model_runs/synthetic_v1_baseline/predictions_all.csv
    - data/model_runs/synthetic_v1_baseline/predictions_test.csv
    - data/model_runs/synthetic_v1_baseline/model.joblib
  legacy_inputs_allowed_only_as_diagnostics:
    - data/synthetic_v1/features/window_features_all.csv
    - data/model_runs/synthetic_v1_baseline/feature_columns.json
    - src/datacenter_verification_synthetic/generate_synthetic_dataset.py

files:
  features: catalog/observable_feature_catalog.v2.yaml
  training_probability_effects: catalog/training_probability_effects.v2.yaml
  feature_dependencies: catalog/feature_dependencies.v2.yaml
  conditional_plausibility_windows: catalog/conditional_plausibility_windows.v2.yaml
  discrepancy_evasion_rules: catalog/discrepancy_evasion_rules.v2.yaml
  validation_script: catalog/validate_v2_catalog.py

intended_build_order:
  - Maintain observable_feature_catalog.v2.yaml as the feature-family inventory.
  - Maintain training_probability_effects.v2.yaml for feature-level evidence direction and caps.
  - Maintain feature_dependencies.v2.yaml for directed relationships only where defensible.
  - Maintain conditional_plausibility_windows.v2.yaml for regime-based realistic cross-feature ranges.
  - Maintain discrepancy_evasion_rules.v2.yaml for explicit anomaly/evasion hypotheses.
  - Derive trainable v2 columns and generator distributions only after these files validate.

validation:
  command: python3 catalog/validate_v2_catalog.py
  expected_observable_count: 17
  expected_feature_count: 70
  requires_no_synthetic_v1_contamination: true
