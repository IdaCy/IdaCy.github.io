catalog_id: observable_feature_catalog.v2
created: '2026-05-12'
status: expanded_feature_cards_ranges_and_provenance
purpose: 'Clean v2 inventory of real or defensible observable features for AI training-run verification. This file intentionally
  excludes synthetic-v1 empirical ranges, previous-model feature importances, previous-model predictions, and old generated
  labels. It records feature existence, units, and possible min/max/range values only.

  '
source_policy:
  primary_scaffold: ai_training_run_ground_truth_ranges.xlsx
  source_tabs_used:
  - Observable Matrix
  - Signals and Ranges
  - Feature Engineering
  - External Sources
  - Source Notes
  old_synthetic_data_used: false
  old_model_outputs_used: false
  old_model_importances_used: false
  old_generator_formulas_used: false
  notes:
  - Possible ranges are broad physical/logical ranges, not calibrated training thresholds.
  - Exact site thresholds must be calibrated by hardware generation, topology, metering point, and access tier.
  - Engineered scores are included only when they correspond to real telemetry surfaces or documented logs.
range_schema:
  type: numeric | fraction | percent | count | duration | bytes | categorical | boolean_score | time_series | date | hash_or_signature
    | ratio
  min: lower possible value, null for non-ordered categorical/hash fields
  max: upper possible value, null when unbounded or not meaningfully ordered
  max_type: fixed | site_dependent | hardware_dependent | policy_dependent | unbounded | categorical | not_applicable
  values: allowed categorical values when known
  notes: range interpretation caveats
sources:
  excel_workbook:
    kind: workbook
    url_or_path: ai_training_run_ground_truth_ranges.xlsx
    note: Original working workbook used to derive this public catalogue; not required at runtime.
    tier: tier_1_official
  slurm_sacct:
    kind: official_doc
    url: https://slurm.schedmd.com/sacct.html
    supports: Slurm job accounting fields, allocations, elapsed time, TRES usage, nodes, accounts, state, energy, and disk
      I/O.
    tier: tier_1_official
  slurm_tres:
    kind: official_doc
    url: https://slurm.schedmd.com/tres.html
    supports: Slurm trackable resources such as CPUs, memory, generic resources, energy, nodes, licenses, and filesystem metrics.
    tier: tier_1_official
  slurm_gres:
    kind: official_doc
    url: https://slurm.schedmd.com/gres.html
    supports: GPU generic resources, NVIDIA NVML autodetection, MIG support, MPS, and sharding configuration.
    tier: tier_1_official
  kubernetes_device_plugins:
    kind: official_doc
    url: https://kubernetes.io/docs/concepts/extend-kubernetes/compute-storage-net/device-plugins/
    supports: Kubernetes allocation/discovery of vendor devices such as GPUs through device plugins.
    tier: tier_1_official
  nvidia_dcgm_exporter:
    kind: official_doc
    url: https://docs.nvidia.com/datacenter/dcgm/latest/gpu-telemetry/dcgm-exporter.html
    supports: DCGM/Prometheus GPU telemetry, SM/memory clocks, temperatures, power, energy, XID/errors, FB memory, NVLink
      bandwidth, and profiling counters.
    tier: tier_1_official
  nvidia_smi:
    kind: official_doc
    url: https://docs.nvidia.com/deploy/nvidia-smi/
    supports: NVIDIA GPU inventory, utilization, memory, power, temperature, clocks, processes, ECC, retired pages, row remap,
      MIG, and accounting fields.
    tier: tier_1_official
  nvidia_ufm_telemetry:
    kind: official_doc
    url: https://docs.nvidia.com/networking/display/ufmsdnappumv4100/telemetry
    supports: UFM telemetry for network bandwidth, congestion, errors, latency, XmitWait, and port-based monitoring.
    tier: tier_1_official
  nvidia_ib_port_counters:
    kind: official_doc
    url: https://docs.nvidia.com/networking/display/ufmsdnappumv4184/infiniband+port+counters
