    name: Physical security, maintenance, and change-management records
    category: Integrity / tamper and hardware-change corroboration
    features:
    - id: o15_rack_door_badge_maintenance_events
      name: Rack-door/badge/maintenance events
      kind: physical_security_log_aggregation
      unit: count_or_duration
      range:
        type: count
        min: 0
        max: null
        max_type: unbounded
