  O16:
    name: Active challenge probes and weak-trust telemetry tests
    category: Auxiliary / research-stage under weak trust
    features:
    - id: o16_probe_throughput_ratio
      name: Probe throughput ratio
      kind: active_probe_metric
      unit: observed_over_expected
      range:
        type: ratio
        min: 0
        max: null
        max_type: unbounded
        notes: Usually expected near 0-1+; denominator must be calibrated for hardware
        clock: null
        and power state.: null
      source_refs:
      - excel_workbook
      raw_data_objects: &id061
      - active probe measurements
      - throughput/latency test results
      - VRAM residency tests
      - expected-baseline calibration
      normalization: Compare observed probe result to randomized, hardware-calibrated expected result and account for power
        state and tenant-safety limits.
      aggregation_windows: &id062
      - randomized challenge window
      - claimed-idle verification window
      missingness_behavior: No probe result means no active-probe evidence; failed probes need benign-explanation analysis
