feature_card_schema:
  id: stable v2 feature-family id
  raw_data_objects: real telemetry/log objects this feature can be derived from
  normalization: how raw data should be normalized before modeling
  aggregation_windows: recommended windows for extraction/interpretation
  missingness_behavior: how absence/unavailability should be interpreted
  privacy_sensitivity: low | medium | high | very_high variants
  trust_requirements: conditions required before the feature is reliable
  training_probability_effect_ref: effect id in training_probability_effects.v2.yaml
  dependencies_in: dependency edge ids where this feature is a child
  dependencies_out: dependency edge ids where this feature is a parent
  known_false_positives: benign/non-training patterns that can produce similar values
