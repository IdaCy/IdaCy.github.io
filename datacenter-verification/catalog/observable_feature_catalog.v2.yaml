    category: Integrity / negative-certification foundation
    features:
    - id: o14_telemetry_coverage_fraction_by_layer
      name: Telemetry coverage fraction by layer
      kind: coverage_fraction
      unit: fraction
      range:
        type: fraction
        min: 0
        max: 1
        max_type: fixed
        notes: Apply separately by layer; full coverage is needed for strong no-run claims.
      source_refs:
      - excel_workbook
      raw_data_objects: &id053
      - coverage vectors
      - scrape success/failure logs
      - clock sync status
      - counter reset logs
      - collector config changes
      normalization: Compute layer-specific coverage/gap fractions and a conservative minimum critical coverage for negative
        certification.
      aggregation_windows: &id054
      - same as evidence window
      - daily coverage rollup
      - incident window
      missingness_behavior: This is the missingness layer; low coverage must cap no-run claims and can raise anomaly only
        when aligned with activity or integrity signals.
      privacy_sensitivity: low_to_medium
      trust_requirements: &id055
      - collector health logs
      - time synchronization evidence
      - configuration change records
      training_probability_effect_ref: effect_o14_telemetry_coverage_fraction_by_layer
      dependencies_out:
      - dep_attestation_telemetry_trust
      - dep_monitoring_integrity_bundle
      dependencies_in: []
      known_false_positives: &id056
      - planned maintenance
      - network outage
      - counter wrap/reset
      - collector upgrade
    - id: o14_telemetry_gap_fraction_missed_scrapes
      name: Telemetry gap fraction / missed scrapes
      kind: coverage_gap_metric
      unit: fraction_or_count
      range:
        type: fraction
        min: 0
        max: 1
        max_type: fixed
        notes: Count form is non-negative and unbounded over long windows; fraction form is 0-1.
      source_refs:
      - excel_workbook
      - nvidia_dcgm_exporter
      raw_data_objects: *id053
      normalization: Compute layer-specific coverage/gap fractions and a conservative minimum critical coverage for negative
