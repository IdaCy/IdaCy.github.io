observables:
  O1:
    name: Hardware inventory and accelerator capacity
    category: Base capacity / context; negative-certification prerequisite
    features:
    - id: o1_accelerator_count
      name: Accelerator count
      kind: raw_or_aggregated_inventory
      unit: accelerators
      range:
        type: count
        min: 0
        max: site_maximum
        max_type: site_dependent
        notes: Count alone is capacity
        not activity.: null
      source_refs:
      - excel_workbook
      - nvidia_smi
      - nvidia_dcgm_exporter
      - slurm_gres
      - kubernetes_device_plugins
      raw_data_objects: &id001
      - accelerator inventory
      - SKU/model records
      - topology/domain records
      - partitioning/MIG/vGPU/MPS configuration
      - hardware change records
      normalization: Normalize by hardware generation and sustained training capacity table; preserve raw counts separately.
      aggregation_windows: &id002
      - inventory snapshot
      - hourly change rollup
      - daily audit rollup
      missingness_behavior: Missing inventory prevents strong capacity and no-run claims; do not infer absence of capacity
        from missing inventory.
      privacy_sensitivity: medium
      trust_requirements: &id003
      - signed inventory or reconciled CMDB
      - cross-check against scheduler/GRES and physical/change records
      training_probability_effect_ref: effect_o1_accelerator_count
      dependencies_out:
      - dep_capacity_bounds_visible_counts
      - dep_external_capacity_reconciliation
      - dep_o2_concurrency_fraction
      dependencies_in: []
      known_false_positives: &id004
      - idle installed capacity
      - heterogeneous fleet counted as homogeneous
      - partitioned inference fleet misread as training capacity
    - id: o1_normalized_training_compute_capacity
      name: H100-equivalent or sustained training compute
      kind: engineered_normalization
      unit: normalized_accelerators_or_flops_per_second
      range:
        type: numeric
        min: 0
        max: null
        max_type: unbounded
        notes: Upper bound depends on installed hardware and normalization table.
      source_refs:
      - excel_workbook
      - nvidia_smi
      - nvidia_dcgm_exporter
      raw_data_objects: *id001
      normalization: Normalize by hardware generation and sustained training capacity table; preserve raw counts separately.
      aggregation_windows: *id002
      missingness_behavior: Missing inventory prevents strong capacity and no-run claims; do not infer absence of capacity
        from missing inventory.
      privacy_sensitivity: medium
      trust_requirements: *id003
      training_probability_effect_ref: effect_o1_normalized_training_compute_capacity
      dependencies_out:
      - dep_capacity_possible
      - dep_o2_allocated_compute_hours
      dependencies_in: []
      known_false_positives: *id004
    - id: o1_homogeneous_high_end_accelerator_fraction
      name: Homogeneous high-end accelerator fraction
      kind: engineered_inventory_fraction
      unit: fraction
      range:
        type: fraction
        min: 0
        max: 1
        max_type: fixed
        notes: 0 means none of the relevant fleet is homogeneous high-end; 1 means all relevant devices match the high-end
          target class.
      source_refs:
      - excel_workbook
      - nvidia_smi
      - slurm_gres
      raw_data_objects: *id001
      normalization: Normalize by hardware generation and sustained training capacity table; preserve raw counts separately.
      aggregation_windows: *id002
      missingness_behavior: Missing inventory prevents strong capacity and no-run claims; do not infer absence of capacity
        from missing inventory.
      privacy_sensitivity: medium
      trust_requirements: *id003
      training_probability_effect_ref: effect_o1_homogeneous_high_end_accelerator_fraction
      dependencies_out:
      - dep_capacity_possible
      dependencies_in: []
      known_false_positives: *id004
    - id: o1_largest_low_latency_topology_footprint
      name: Low-latency topology footprint
      kind: topology_inventory
      unit: accelerators_per_domain_or_graph_metric
      range:
        type: count
        min: 0
        max: site_maximum
        max_type: site_dependent
        notes: Use 0 when no accelerator topology domain is present; otherwise domain size or graph-derived footprint.
      source_refs:
      - excel_workbook
      - nvidia_smi
      - nvidia_dcgm_exporter
      - slurm_gres
      raw_data_objects: *id001
      normalization: Normalize by hardware generation and sustained training capacity table; preserve raw counts separately.
      aggregation_windows: *id002
      missingness_behavior: Missing inventory prevents strong capacity and no-run claims; do not infer absence of capacity
        from missing inventory.
      privacy_sensitivity: medium
      trust_requirements: *id003
      training_probability_effect_ref: effect_o1_largest_low_latency_topology_footprint
      dependencies_out:
      - dep_capacity_bounds_visible_counts
      - dep_capacity_possible
      - dep_o2_concurrency_fraction
      dependencies_in: []
      known_false_positives: *id004
    - id: o1_partitioning_fraction
      name: MIG/vGPU/MPS partitioning fraction
      kind: inventory_configuration
      unit: fraction_or_enum_profile
      range:
        type: fraction
        min: 0
        max: 1
        max_type: fixed
        notes: 0 means unpartitioned; 1 means all relevant accelerators are partitioned or shared.
      source_refs:
      - excel_workbook
      - nvidia_smi
      - slurm_gres
      - nvidia_dcgm_exporter
      raw_data_objects: *id001
      normalization: Normalize by hardware generation and sustained training capacity table; preserve raw counts separately.
      aggregation_windows: *id002
      missingness_behavior: Missing inventory prevents strong capacity and no-run claims; do not infer absence of capacity
        from missing inventory.
      privacy_sensitivity: medium
      trust_requirements: *id003
      training_probability_effect_ref: effect_o1_partitioning_fraction
      dependencies_out:
      - dep_capacity_possible
      dependencies_in: []
      known_false_positives: *id004
    - id: o1_inventory_delta_rate
      name: Inventory delta / hardware swap rate
      kind: engineered_change_rate
      unit: events_per_day
      range:
        type: numeric
        min: 0
        max: null
        max_type: unbounded
        notes: Counts additions
        removals: null
        swaps: null
        or topology changes per time window.: null
      source_refs:
      - excel_workbook
      - nvidia_smi
      - slurm_gres
      raw_data_objects: *id001
      normalization: Normalize by hardware generation and sustained training capacity table; preserve raw counts separately.
      aggregation_windows: *id002
      missingness_behavior: Missing inventory prevents strong capacity and no-run claims; do not infer absence of capacity
        from missing inventory.
      privacy_sensitivity: medium
      trust_requirements: *id003
      training_probability_effect_ref: effect_o1_inventory_delta_rate
      dependencies_out:
      - dep_physical_change_integrity
      dependencies_in: []
      known_false_positives: *id004
  O2:
    name: Scheduler, job, reservation, and allocation metadata
    category: Primary activity / core run-state signal
    features:
    - id: o2_allocated_accelerator_count
      name: Allocated GPU count per job or linked job group
      kind: scheduler_accounting
      unit: accelerators
      range:
        type: count
        min: 0
        max: site_maximum
        max_type: site_dependent
        notes: Derived from allocated GRES/TRES/device resources across a job or linked job group.
      source_refs:
      - excel_workbook
      - slurm_sacct
      - slurm_tres
      - slurm_gres
      - kubernetes_device_plugins
      raw_data_objects: &id005
      - scheduler job records
      - job-step records
      - allocated resources/TRES/GRES
      - start/end/elapsed timestamps
      - account/project/user linkage
      - reservation/preemption state
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: &id006
      - 5-30m candidate detection
      - 1-6h activity confirmation
      - 24h-7d sustained run analysis
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: &id007
      - scheduler accounting enabled
      - stable account/job linkage
      - coverage and signature status known
      training_probability_effect_ref: effect_o2_allocated_accelerator_count
      dependencies_out:
      - dep_cloud_scheduler_consistency
      - dep_o2_allocated_compute_hours
      - dep_o2_concurrency_fraction
      dependencies_in:
      - dep_capacity_bounds_visible_counts
      known_false_positives: &id008
      - reserved but idle capacity
      - large HPC/MPI job
      - batch inference
      - benchmark or burn-in job
    - id: o2_allocation_duration
      name: Allocation duration
      kind: scheduler_accounting
      unit: seconds_or_hours
      range:
        type: duration
        min: 0
        max: policy_or_accounting_retention_max
        max_type: policy_dependent
        notes: Logical minimum is 0; upper bound is scheduler/accounting policy and retention dependent.
      source_refs:
      - excel_workbook
      - slurm_sacct
      raw_data_objects: *id005
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: *id006
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: *id007
      training_probability_effect_ref: effect_o2_allocation_duration
      dependencies_out:
      - dep_cloud_scheduler_consistency
      - dep_o2_allocated_compute_hours
      dependencies_in: []
      known_false_positives: *id008
    - id: o2_allocated_compute_hours
      name: GPU-hours / normalized compute-hours
      kind: deterministic_engineered
      unit: accelerator_hours_or_h100e_hours
      range:
        type: numeric
        min: 0
        max: null
        max_type: unbounded
        notes: Usually allocated accelerator count multiplied by duration and hardware-normalization factor.
      source_refs:
      - excel_workbook
      - slurm_sacct
      - slurm_tres
      raw_data_objects: *id005
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: *id006
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: *id007
      training_probability_effect_ref: effect_o2_allocated_compute_hours
      dependencies_out: []
      dependencies_in:
      - dep_o2_allocated_compute_hours
      known_false_positives: *id008
    - id: o2_concurrency_fraction
      name: Concurrency fraction of site/fabric
      kind: engineered_fraction
      unit: fraction
      range:
        type: fraction
        min: 0
        max: 1
        max_type: fixed
        notes: Can exceed 1 only if denominator/scope is wrong or off-ledger capacity is omitted; such values should be discrepancy
          flags.
      source_refs:
      - excel_workbook
      - slurm_sacct
      - slurm_tres
      raw_data_objects: *id005
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: *id006
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: *id007
      training_probability_effect_ref: effect_o2_concurrency_fraction
      dependencies_out:
      - dep_gpu_power_to_rack_power
      dependencies_in:
      - dep_o2_concurrency_fraction
      known_false_positives: *id008
    - id: o2_topology_contiguity
      name: Topology contiguity / allocation locality
      kind: engineered_topology_score
      unit: fraction
      range:
        type: fraction
        min: 0
        max: 1
        max_type: fixed
        notes: 0 scattered; 1 fully contiguous within the relevant low-latency topology.
      source_refs:
      - excel_workbook
      - slurm_sacct
      - slurm_gres
      raw_data_objects: *id005
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: *id006
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: *id007
      training_probability_effect_ref: effect_o2_topology_contiguity
      dependencies_out: []
      dependencies_in: []
      known_false_positives: *id008
    - id: o2_declared_workload_class
      name: Declared workload class
      kind: scheduler_declaration
      unit: categorical
      range:
        type: categorical
        min: null
        max: null
        max_type: categorical
        values:
        - train
        - fine_tune
        - inference
        - hpc
        - data
        - benchmark
        - evaluation
        - unknown
        notes: Treat as evidence, not proof.
      source_refs:
      - excel_workbook
      - slurm_sacct
      - kubernetes_device_plugins
      raw_data_objects: *id005
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: *id006
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: *id007
      training_probability_effect_ref: effect_o2_declared_workload_class
      dependencies_out:
      - dep_runtime_framework_interpretation
      dependencies_in: []
      known_false_positives: *id008
    - id: o2_reservation_priority_preemption_pattern
      name: Reservation priority/preemption pattern
      kind: scheduler_accounting
      unit: categorical_and_count
      range:
        type: categorical
        min: 0
        max: null
        max_type: unbounded
        values:
        - reserved
        - on_demand
        - preemptible
        - spot
        - priority
        - unknown
        notes: Preemption/restart counts are non-negative; priority classes are scheduler-specific.
      source_refs:
      - excel_workbook
      - slurm_sacct
      raw_data_objects: *id005
      normalization: Link jobs into policy-relevant groups, normalize accelerator count by hardware generation, and aggregate
        by topology domain/window.
      aggregation_windows: *id006
      missingness_behavior: With strong scheduler coverage, zero allocation is strong absence for that layer; with weak coverage
        it is unknown, not zero activity.
      privacy_sensitivity: high
      trust_requirements: *id007
      training_probability_effect_ref: effect_o2_reservation_priority_preemption_pattern
      dependencies_out: []
      dependencies_in: []
      known_false_positives: *id008
  O3:
    name: Cloud control-plane, capacity reservation, and billing records
    category: Primary activity / commercial-account attribution
    features:
    - id: o3_batch_provisioning_event_size
      name: Batch provisioning event size
      kind: cloud_control_plane
      unit: instances_or_accelerators_per_event
      range:
        type: count
        min: 0
        max: provider_quota_or_reservation_limit
        max_type: site_dependent
        notes: Upper bound depends on provider quota
        reservation: null
        and account/org grouping.: null
      source_refs:
      - excel_workbook
      - aws_ec2_cloudtrail
      - aws_ec2_runinstances
      - google_cloud_audit_logs
      raw_data_objects: &id009
      - cloud API events
      - capacity reservation records
      - instance launch parameters
      - billing line items
      - region/AZ/placement/account metadata
      normalization: Map cloud instances/SKUs to accelerator counts and training-capable classes; aggregate by pseudonymous
        account/org and placement group.
      aggregation_windows: &id010
      - launch burst window
      - hourly billing window
      - reservation duration window
      missingness_behavior: Missing cloud-control data weakens attribution and provisioning claims; billing delay should be
        modeled separately from absence.
      privacy_sensitivity: high
      trust_requirements: &id011
      - provider-side control-plane logs
      - billing export completeness
      - account/org linkage
      training_probability_effect_ref: effect_o3_batch_provisioning_event_size
      dependencies_out:
      - dep_cloud_provisioned_commitment
      - dep_cloud_scheduler_consistency
      dependencies_in:
      - dep_capacity_bounds_visible_counts
      known_false_positives: &id012
      - capacity held but unused
      - high-end inference fleet
      - HPC reservation
      - data-processing cluster
    - id: o3_capacity_reservation_block_duration
      name: Capacity reservation/block duration
      kind: cloud_reservation
      unit: seconds_hours_or_days
      range:
        type: duration
        min: 0
        max: provider_product_limit
        max_type: policy_dependent
