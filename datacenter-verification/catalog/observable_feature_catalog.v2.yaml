      - excel_workbook
      raw_data_objects: &id057
      - badge/rack-door logs
      - maintenance tickets
      - change approvals
      - firmware/BMC update records
      - RMA/physical access records
      normalization: Bucket and minimize physical-security data; align events with telemetry gaps, inventory deltas, and candidate
        windows.
      aggregation_windows: &id058
      - candidate window plus guard band
      - daily/weekly change-management rollup
      missingness_behavior: Missing physical logs weaken tamper analysis; physical events alone are not training evidence.
      privacy_sensitivity: very_high
      trust_requirements: &id059
      - access-control log integrity
      - change-ticket linkage
      - approval status
      training_probability_effect_ref: effect_o15_rack_door_badge_maintenance_events
