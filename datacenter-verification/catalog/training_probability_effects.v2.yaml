catalog_id: training_probability_effects.v2
created: "2026-05-12"
status: source_backed_evidence_effects_not_calibrated_probabilities
purpose: >
  Stores how each v2 feature family should affect evidence for a large training run.
  These are not calibrated real-world probabilities. They are qualitative, source-backed
  evidence effects with caps and confidence.

effect_schema:
  direction: increases | decreases | conditional | neutral | trust_modifier_only
  strength: primary | supporting | weak | capacity_gate | semantic | countervailing | integrity_only
  shape: monotonic | thresholded | capped | conditional | u_shaped | not_applicable
  label_cap: highest label this feature family can support alone
  confidence: high | medium | low
  source_refs: source ids from observable_feature_catalog.v2.yaml

observable_effect_defaults:
  O1: {direction: conditional, strength: capacity_gate, shape: thresholded_capped, label_cap: 1, confidence: high}
  O2: {direction: increases, strength: primary, shape: monotonic_thresholded, label_cap: 3, confidence: high}
  O3: {direction: increases, strength: primary, shape: monotonic_thresholded, label_cap: 3, confidence: medium}
  O4: {direction: increases, strength: primary, shape: monotonic_thresholded_capped, label_cap: 3, confidence: high}
  O5: {direction: conditional, strength: primary, shape: conditional, label_cap: 3, confidence: medium}
  O6: {direction: conditional, strength: primary, shape: thresholded_capped, label_cap: 3, confidence: medium}
  O7: {direction: increases, strength: primary, shape: thresholded_capped, label_cap: 3, confidence: high}
  O8: {direction: increases, strength: supporting, shape: monotonic_capped, label_cap: 2, confidence: high}
  O9: {direction: increases, strength: supporting, shape: lagged_capped, label_cap: 2, confidence: medium}
  O10: {direction: conditional, strength: semantic, shape: conditional, label_cap: 4, confidence: medium}
  O11: {direction: conditional, strength: supporting, shape: conditional, label_cap: 3, confidence: medium}
  O12: {direction: conditional, strength: semantic, shape: conditional, label_cap: 4, confidence: medium}
  O13: {direction: trust_modifier_only, strength: integrity_only, shape: not_applicable, label_cap: 0, confidence: medium}
  O14: {direction: trust_modifier_only, strength: integrity_only, shape: not_applicable, label_cap: 0, confidence: high}
  O15: {direction: trust_modifier_only, strength: integrity_only, shape: not_applicable, label_cap: 0, confidence: medium}
  O16: {direction: conditional, strength: weak, shape: conditional, label_cap: 2, confidence: low}
  O17: {direction: conditional, strength: capacity_gate, shape: thresholded_capped, label_cap: 1, confidence: low}

feature_effects:
  effect_o1_accelerator_count:
    feature_id: o1_accelerator_count
    direction: conditional
    strength: capacity_gate
    shape: thresholded_capped
    label_cap: 1
    confidence: high
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter, slurm_gres, kubernetes_device_plugins]
    effect: Higher count increases feasibility of a policy-scale run but is not activity evidence.
    false_positive_or_limit: Idle installed capacity, heterogeneous capacity, or partitioned inference capacity.
  effect_o1_normalized_training_compute_capacity:
    feature_id: o1_normalized_training_compute_capacity
    direction: conditional
    strength: capacity_gate
    shape: thresholded_capped
    label_cap: 1
    confidence: high
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: Higher normalized capacity increases feasibility; below policy threshold can rule out monitored-boundary runs when coverage is strong.
    false_positive_or_limit: Normalization table error or unobserved off-ledger capacity.
  effect_o1_homogeneous_high_end_accelerator_fraction:
    feature_id: o1_homogeneous_high_end_accelerator_fraction
    direction: conditional
    strength: capacity_gate
    shape: thresholded_capped
    label_cap: 1
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, slurm_gres]
    effect: Higher homogeneity supports feasibility of synchronized large training; low homogeneity weakens monolithic-training plausibility.
    false_positive_or_limit: Inference and some training can tolerate mixed fleets; homogeneity alone is not activity.
  effect_o1_largest_low_latency_topology_footprint:
    feature_id: o1_largest_low_latency_topology_footprint
    direction: conditional
    strength: capacity_gate
    shape: thresholded_capped
    label_cap: 1
    confidence: high
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter, slurm_gres]
    effect: Larger low-latency footprint increases feasibility of synchronized training and bounds fabric/runtime counts.
    false_positive_or_limit: Large topology can be idle or used for HPC/inference.
  effect_o1_partitioning_fraction:
    feature_id: o1_partitioning_fraction
    direction: decreases
    strength: capacity_gate
    shape: monotonic_capped
    label_cap: 1
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, slurm_gres, nvidia_dcgm_exporter]
    effect: Higher partitioning generally reduces plausibility of one monolithic large training run, while supporting inference/multi-tenancy explanations.
    false_positive_or_limit: Partitioning can change quickly and some workloads use partitioned devices.
  effect_o1_inventory_delta_rate:
    feature_id: o1_inventory_delta_rate
    direction: conditional
    strength: integrity_only
    shape: conditional
    label_cap: 0
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, slurm_gres]
    effect: Unexpected capacity changes modify trust and can raise discrepancy risk; they are not training proof.
    false_positive_or_limit: Planned maintenance, RMA, expansion, or inventory reconciliation.

  effect_o2_allocated_accelerator_count:
    feature_id: o2_allocated_accelerator_count
    direction: increases
    strength: primary
    shape: monotonic_thresholded
    label_cap: 3
    confidence: high
    source_refs: [excel_workbook, slurm_sacct, slurm_tres, slurm_gres, kubernetes_device_plugins]
    effect: Higher concurrent allocated accelerator count is a primary activity anchor when scheduler coverage is strong.
    false_positive_or_limit: Idle reservations, HPC, inference, benchmarks.
  effect_o2_allocation_duration:
    feature_id: o2_allocation_duration
    direction: increases
    strength: primary
    shape: monotonic_thresholded
    label_cap: 3
    confidence: high
    source_refs: [excel_workbook, slurm_sacct]
    effect: Longer allocation strengthens sustained-run evidence when paired with substantial accelerator count.
    false_positive_or_limit: Long idle reservation or non-training HPC.
  effect_o2_allocated_compute_hours:
    feature_id: o2_allocated_compute_hours
    direction: increases
    strength: primary
    shape: thresholded
    label_cap: 3
    confidence: high
    source_refs: [excel_workbook, slurm_sacct, slurm_tres]
    effect: Count-times-duration normalized compute is the main policy-scale activity quantity when scheduler coverage is complete.
    false_positive_or_limit: Allocation does not prove utilization or training semantics.
  effect_o2_concurrency_fraction:
    feature_id: o2_concurrency_fraction
    direction: increases
    strength: primary
    shape: thresholded_capped
    label_cap: 3
    confidence: high
    source_refs: [excel_workbook, slurm_sacct, slurm_tres]
    effect: Larger fraction of site/domain used by one linked job group increases large-run plausibility.
    false_positive_or_limit: Denominator/scope errors and dedicated regions can distort interpretation.
  effect_o2_topology_contiguity:
    feature_id: o2_topology_contiguity
    direction: increases
    strength: primary
    shape: monotonic_capped
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, slurm_sacct, slurm_gres]
    effect: Higher locality/contiguity supports synchronized distributed training feasibility.
    false_positive_or_limit: Some training is fragmented; some HPC also uses contiguous allocations.
  effect_o2_declared_workload_class:
    feature_id: o2_declared_workload_class
    direction: conditional
    strength: semantic
    shape: conditional
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, slurm_sacct, kubernetes_device_plugins]
    effect: Declared training raises suspicion only as a self-report; declared inference/HPC can be countervailing if consistent with other layers.
    false_positive_or_limit: Declarations can be absent, wrong, stale, or adversarial.
  effect_o2_reservation_priority_preemption_pattern:
    feature_id: o2_reservation_priority_preemption_pattern
    direction: conditional
    strength: supporting
    shape: conditional
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, slurm_sacct]
    effect: Long reserved/non-preemptible blocks support sustained planned activity; high preemption supports opportunistic or fragmented explanations.
    false_positive_or_limit: Training can use spot/preemptible capacity with checkpointing.

  effect_o3_batch_provisioning_event_size:
    feature_id: o3_batch_provisioning_event_size
    direction: increases
    strength: primary
    shape: thresholded
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, aws_ec2_cloudtrail, aws_ec2_runinstances, google_cloud_audit_logs]
    effect: Large synchronized high-end provisioning events are strong candidate-window evidence in cloud settings.
    false_positive_or_limit: Provisioning does not prove utilization or training.
  effect_o3_capacity_reservation_block_duration:
    feature_id: o3_capacity_reservation_block_duration
    direction: increases
    strength: supporting
    shape: monotonic_thresholded
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, aws_ec2_capacity_blocks]
    effect: Longer capacity reservations support planned large activity but remain commitment/capacity evidence.
    false_positive_or_limit: Reserved but unused capacity, HPC, inference.
  effect_o3_training_instance_type_fraction:
    feature_id: o3_training_instance_type_fraction
    direction: increases
    strength: supporting
    shape: monotonic_capped
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, aws_ec2_runinstances, aws_ec2_capacity_blocks, google_cloud_audit_logs]
    effect: Higher fraction of training-class accelerator SKUs supports training-capable provisioning.
    false_positive_or_limit: High-end SKUs are also used for inference, HPC, and benchmarks.
  effect_o3_billing_continuity_diurnal_index:
    feature_id: o3_billing_continuity_diurnal_index
    direction: conditional
    strength: supporting
    shape: u_shaped_or_contextual
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, aws_cur]
    effect: Continuous non-diurnal high spend can support sustained training/HPC; diurnal patterns support serving alternatives.
    false_positive_or_limit: Billing granularity and delay can hide activity shape.
  effect_o3_egress_inter_region_movement:
    feature_id: o3_egress_inter_region_movement
    direction: conditional
    strength: weak
    shape: thresholded_capped
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, aws_cur, aws_s3_server_access_logging, google_cloud_audit_logs]
    effect: Large post-run egress/export can support checkpoint/model movement when aligned with other layers.
    false_positive_or_limit: ETL, backup, replication, analytics export.

  effect_o4_gpu_busy_percent: &o4_primary_effect
    feature_id: o4_gpu_busy_percent
    direction: increases
    strength: primary
    shape: monotonic_thresholded_capped
    label_cap: 3
    confidence: high
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter, google_gpu_monitoring, google_ops_agent_dcgm]
    effect: Sustained high activity across many allocated accelerators is strong compute-use evidence but not training semantics.
    false_positive_or_limit: Inference, HPC, benchmarks, burn-in, and data processing can be high utilization.
  effect_o4_sm_tensor_core_active_percent:
    <<: *o4_primary_effect
    feature_id: o4_sm_tensor_core_active_percent
    source_refs: [excel_workbook, nvidia_dcgm_exporter, google_ops_agent_dcgm]
    effect: Sustained tensor activity supports dense ML-style computation when aligned with allocation/fabric/runtime.
  effect_o4_hbm_memory_used:
    <<: *o4_primary_effect
    feature_id: o4_hbm_memory_used
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter, google_ops_agent_dcgm]
    effect: High HBM residency supports large model or data footprint but is also common in inference/KV-cache use.
  effect_o4_hbm_dram_bandwidth_active:
    <<: *o4_primary_effect
    feature_id: o4_hbm_dram_bandwidth_active
    source_refs: [excel_workbook, nvidia_dcgm_exporter]
    effect: Sustained high bandwidth plus compute/fabric evidence supports training-like activity.
  effect_o4_gpu_power_draw_or_fraction:
    <<: *o4_primary_effect
    feature_id: o4_gpu_power_draw_or_fraction
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter, google_ops_agent_dcgm]
    effect: High GPU power is strong anti-idle evidence and should corroborate rack/facility power.
  effect_o4_per_process_gpu_memory_accounting:
    <<: *o4_primary_effect
    feature_id: o4_per_process_gpu_memory_accounting
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: Many similar long-lived rank processes with similar memory supports distributed workload attribution.
    confidence: medium
  effect_o4_gpu_health_error_counts:
    feature_id: o4_gpu_health_error_counts
    direction: trust_modifier_only
    strength: integrity_only
    shape: conditional
    label_cap: 0
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: Error spikes explain telemetry gaps or degraded performance; they are not training evidence.
    false_positive_or_limit: Hardware faults and maintenance.

  effect_o5_kernel_family_name_hash_sequence:
    feature_id: o5_kernel_family_name_hash_sequence
    direction: conditional
    strength: primary
    shape: conditional
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, nvidia_dcgm_exporter]
    effect: Repeated forward/backward/optimizer-like kernel motifs support training when authenticated and aligned.
    false_positive_or_limit: Benchmarks and HPC libraries can mimic kernel classes.
  effect_o5_achieved_tensor_throughput_ratio:
    feature_id: o5_achieved_tensor_throughput_ratio
    direction: increases
    strength: primary
    shape: monotonic_capped
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, nvidia_dcgm_exporter]
    effect: High sustained tensor throughput supports dense ML compute, conditional on duration and footprint.
    false_positive_or_limit: GEMM benchmarks and HPC dense linear algebra.
  effect_o5_profiler_availability_state:
    feature_id: o5_profiler_availability_state
    direction: trust_modifier_only
    strength: integrity_only
    shape: not_applicable
    label_cap: 0
    confidence: medium
    source_refs: [excel_workbook, nvidia_dcgm_exporter, nvidia_h100_confidential_computing]
    effect: Profiler availability controls how much kernel/counter absence means; blocked profilers are not zero activity.
    false_positive_or_limit: Confidential compute or security policy can legitimately disable profiling.

  effect_o6_nvlink_nvswitch_link_utilization:
    feature_id: o6_nvlink_nvswitch_link_utilization
    direction: increases
    strength: primary
    shape: thresholded_capped
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: High local peer fabric use supports tensor/model parallel or collective activity.
    false_positive_or_limit: Multi-GPU inference, NCCL tests, HPC collectives.
  effect_o6_nvlink_nvswitch_correlation_periodicity:
    feature_id: o6_nvlink_nvswitch_correlation_periodicity
    direction: conditional
    strength: primary
    shape: thresholded_capped
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: Strong correlated periodic local fabric bursts support synchronized distributed workloads.
    false_positive_or_limit: HPC and benchmark collectives.
  effect_o6_local_fabric_link_error_events:
    feature_id: o6_local_fabric_link_error_events
    direction: trust_modifier_only
    strength: integrity_only
    shape: conditional
    label_cap: 0
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: Link errors explain degraded performance or missing fabric data; not training evidence.
    false_positive_or_limit: Hardware/network faults.

  effect_o7_scaleout_port_utilization: &o7_primary_effect
    feature_id: o7_scaleout_port_utilization
    direction: increases
    strength: primary
    shape: thresholded_capped
    label_cap: 3
    confidence: high
    source_refs: [excel_workbook, nvidia_ufm_telemetry, nvidia_ib_port_counters, aws_efa]
    effect: Sustained or bursty high utilization across many training-fabric ports is a strong non-semantic activity signal.
    false_positive_or_limit: HPC/MPI, storage replication, distributed inference, fabric benchmarks.
  effect_o7_synchronized_fabric_footprint:
    <<: *o7_primary_effect
    feature_id: o7_synchronized_fabric_footprint
    source_refs: [excel_workbook, nvidia_ufm_telemetry, nvidia_ib_port_counters, nccl_env]
    effect: Larger synchronized footprint is one of the strongest non-semantic indicators of a large coordinated run.
  effect_o7_collective_periodicity_step_cadence:
    <<: *o7_primary_effect
    feature_id: o7_collective_periodicity_step_cadence
    source_refs: [excel_workbook, nvidia_ufm_telemetry, nvidia_ib_port_counters, pytorch_distributed, nccl_env]
    effect: Regular collective-like cadence supports training-step synchronization when aligned with GPU/runtime/storage evidence.
  effect_o7_rdma_congestion_retry_drops:
    <<: *o7_primary_effect
    feature_id: o7_rdma_congestion_retry_drops
    effect: Periodic congestion/retry/drops aligned with collectives support synchronized barriers but can also indicate network trouble.
    confidence: medium
  effect_o7_job_to_port_mapping_coverage:
    feature_id: o7_job_to_port_mapping_coverage
    direction: trust_modifier_only
    strength: integrity_only
    shape: not_applicable
    label_cap: 0
    confidence: high
    source_refs: [excel_workbook, nvidia_ufm_telemetry, slurm_sacct, kubernetes_device_plugins]
    effect: Higher mapping coverage increases attribution confidence; it is not activity evidence by itself.
    false_positive_or_limit: Privacy-preserving aggregation can intentionally lower mapping detail.

  effect_o8_rack_it_power_kw: &o8_support_effect
    feature_id: o8_rack_it_power_kw
    direction: increases
    strength: supporting
    shape: monotonic_capped
    label_cap: 2
    confidence: high
    source_refs: [excel_workbook, nvidia_dgx_h100_power, nvidia_dgx_gb200_power]
    effect: Sustained high rack/server power is hard-to-fake physical corroboration of load but not workload semantics.
    false_positive_or_limit: HPC, inference, burn-in, non-GPU load, power/cooling tests.
  effect_o8_facility_it_power_mw:
    <<: *o8_support_effect
    feature_id: o8_facility_it_power_mw
    source_refs: [excel_workbook, nvidia_dgx_gb200_power]
    effect: Sustained MW-scale IT load supports facility-scale activity but needs mapping to monitored accelerator domains.
  effect_o8_power_continuity_cv_diurnal_ratio:
    <<: *o8_support_effect
    feature_id: o8_power_continuity_cv_diurnal_ratio
    source_refs: [excel_workbook]
    direction: conditional
    effect: Low variation over days supports sustained batch activity; high diurnal variation supports serving alternatives.
  effect_o8_power_to_telemetry_consistency:
    feature_id: o8_power_to_telemetry_consistency
    direction: trust_modifier_only
    strength: integrity_only
    shape: thresholded
    label_cap: 0
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]
    effect: High physical load inconsistent with visible telemetry raises discrepancy/evasion or mapping-error suspicion.
    false_positive_or_limit: Non-GPU load, meter mapping errors, baseline drift.

  effect_o9_gpu_hbm_temperature_celsius: &o9_support_effect
    feature_id: o9_gpu_hbm_temperature_celsius
    direction: increases
    strength: supporting
    shape: lagged_capped
    label_cap: 2
    confidence: medium
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter, google_ops_agent_dcgm]
    effect: Sustained elevated thermal state corroborates power/activity with lag and hardware-specific thresholds.
    false_positive_or_limit: Ambient heat, cooling changes, burn-in, other load.
  effect_o9_liquid_cooling_delta_t_celsius:
    <<: *o9_support_effect
    feature_id: o9_liquid_cooling_delta_t_celsius
    source_refs: [excel_workbook, nvidia_dgx_gb200_power]
  effect_o9_cooling_flow_fan_speed:
    <<: *o9_support_effect
    feature_id: o9_cooling_flow_fan_speed
    source_refs: [excel_workbook, nvidia_smi, nvidia_dcgm_exporter]

  effect_o10_distributed_world_size_rank_count:
    feature_id: o10_distributed_world_size_rank_count
    direction: increases
    strength: semantic
    shape: thresholded_capped
    label_cap: 4
    confidence: medium
    source_refs: [excel_workbook, pytorch_distributed, pytorch_torchrun]
    effect: Large stable distributed world size is strong semantic/runtime evidence when authentic and aligned with activity layers.
    false_positive_or_limit: HPC/MPI and distributed inference can also have large ranks.
  effect_o10_runtime_framework_class:
    feature_id: o10_runtime_framework_class
    direction: conditional
    strength: semantic
    shape: conditional
    label_cap: 4
    confidence: medium
    source_refs: [excel_workbook, pytorch_distributed, pytorch_torchrun, nccl_env, kubernetes_device_plugins]
    effect: Training frameworks support training; serving/HPC frameworks can be countervailing if consistent with other evidence.
    false_positive_or_limit: Frameworks can be reused for benchmarks/eval/inference.
  effect_o10_rendezvous_rank_mapping_stability:
    feature_id: o10_rendezvous_rank_mapping_stability
    direction: increases
    strength: semantic
    shape: monotonic_capped
    label_cap: 4
    confidence: medium
    source_refs: [excel_workbook, pytorch_torchrun, pytorch_distributed]
    effect: Stable ranks/rendezvous over sustained windows support one coordinated distributed workload.
    false_positive_or_limit: Stable HPC jobs and long-running inference replicas.
  effect_o10_container_vm_image_digest_recurrence:
    feature_id: o10_container_vm_image_digest_recurrence
    direction: conditional
    strength: semantic
    shape: conditional
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, kubernetes_device_plugins, aws_ec2_cloudtrail, google_cloud_audit_logs]
    effect: Same image across many accelerators supports one workload; class of image determines training vs alternative meaning.
    false_positive_or_limit: Serving fleets and HPC deployments can also be homogeneous.

  effect_o11_initial_data_staging_volume:
    feature_id: o11_initial_data_staging_volume
    direction: conditional
    strength: supporting
    shape: thresholded_capped
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, aws_s3_server_access_logging, google_cloud_audit_logs, slurm_sacct]
    effect: Large pre-run staging supports training/data-prep when aligned with allocation and runtime.
    false_positive_or_limit: ETL, analytics, backup, data migration.
  effect_o11_checkpoint_write_size:
    feature_id: o11_checkpoint_write_size
    direction: increases
    strength: supporting
    shape: thresholded_capped
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, aws_s3_server_access_logging, pytorch_distributed_checkpoint, mlflow_tracking]
    effect: Large periodic checkpoint writes support training when aligned with job/runtime windows.
    false_positive_or_limit: Backup and replication workloads.
  effect_o11_checkpoint_period:
    feature_id: o11_checkpoint_period
    direction: conditional
    strength: supporting
    shape: conditional
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, pytorch_distributed_checkpoint, mlflow_tracking]
    effect: Regular checkpoint cadence aligned with allocation/runtime supports training.
    false_positive_or_limit: Scheduled backups or periodic exports.
  effect_o11_read_write_operation_pattern:
    feature_id: o11_read_write_operation_pattern
    direction: conditional
    strength: supporting
    shape: conditional
    label_cap: 3
    confidence: medium
    source_refs: [excel_workbook, aws_s3_server_access_logging, google_cloud_audit_logs, slurm_sacct]
    effect: Repeated shard reads plus periodic writes support training; one-way export supports model movement.
    false_positive_or_limit: Storage rebuilds, ETL, metadata storms.

  effect_o12_declared_model_parameter_count:
    feature_id: o12_declared_model_parameter_count
    direction: conditional
    strength: semantic
    shape: thresholded
    label_cap: 4
    confidence: medium
    source_refs: [excel_workbook, mlflow_tracking, wandb_tracking]
    effect: Large declared model size supports policy-scale training only with tokens/steps and activity evidence.
    false_positive_or_limit: Declarations can be absent, fabricated, or refer to inference/eval.
  effect_o12_training_tokens_examples:
    feature_id: o12_training_tokens_examples
    direction: conditional
    strength: semantic
    shape: thresholded
    label_cap: 4
    confidence: medium
    source_refs: [excel_workbook, mlflow_tracking, wandb_tracking]
    effect: Large token/example counts support training compute estimates when signed and consistent.
    false_positive_or_limit: Data preprocessing, synthetic data, or inaccurate declarations.
  effect_o12_step_count_and_step_time:
    feature_id: o12_step_count_and_step_time
    direction: increases
    strength: semantic
    shape: thresholded_capped
    label_cap: 4
