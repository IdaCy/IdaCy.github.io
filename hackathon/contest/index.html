<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Horizons Hackathon Contest</title>
  <meta name="description" content="Contest view for the Time Horizons Hackathon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../release.css">
</head>
<body>
  <div class="page-shell contest-shell">
    <header class="contest-header">
      <div>
        <p class="eyebrow">Baseline drive</p>
        <h1>Contest</h1>
        <p>Sign in, choose a problem, and submit your answer when you are done.</p>
      </div>
      <nav class="contest-nav" aria-label="Contest">
        <a class="btn btn--primary" href="./">Problems</a>
        <a class="btn btn--secondary" href="../submissions/">Submissions</a>
      </nav>
    </header>

    <main id="contest-app" class="contest-app" data-contest-app></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="../hackathon-config.js" defer></script>
  <script src="../release.js" defer></script>
</body>
</html>
